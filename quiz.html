<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Quiz - Stolice i Flagi</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e;
  color: #eee;
  min-height: 100vh;
  padding: 16px;
}
h1 { text-align: center; margin: 12px 0; font-size: 1.5em; color: #e94560; }
h2 { text-align: center; margin: 8px 0; font-size: 1.1em; color: #aaa; }

/* Start screen */
#start { max-width: 500px; margin: 0 auto; }
.cat-btn {
  display: block; width: 100%; padding: 14px; margin: 8px 0;
  font-size: 1.1em; border: 2px solid #e94560; border-radius: 10px;
  background: transparent; color: #eee; cursor: pointer;
  transition: all 0.2s;
}
.cat-btn:hover, .cat-btn:active { background: #e94560; color: #fff; }
.cat-btn .count { font-size: 0.8em; color: #888; }

/* Quiz screen */
#quiz { max-width: 500px; margin: 0 auto; display: none; }
.score-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; background: #16213e; border-radius: 8px; margin-bottom: 12px;
  font-size: 0.95em;
}
.score-bar .pts { color: #0f3460; font-weight: bold; color: #e94560; }
.country-name {
  text-align: center; font-size: 1.6em; font-weight: bold;
  padding: 16px; background: #16213e; border-radius: 10px; margin-bottom: 12px;
}
.input-row { margin-bottom: 12px; }
.input-row label { display: block; margin-bottom: 4px; color: #aaa; font-size: 0.9em; }
.input-row input {
  width: 100%; padding: 12px; font-size: 1.1em; border: 2px solid #333;
  border-radius: 8px; background: #16213e; color: #eee; outline: none;
}
.input-row input:focus { border-color: #e94560; }
.input-row input:disabled { opacity: 0.6; }

.flags-label { color: #aaa; font-size: 0.9em; margin-bottom: 6px; }
.flags-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px;
}
.flag-opt {
  border: 3px solid #333; border-radius: 8px; cursor: pointer;
  overflow: hidden; transition: all 0.2s; position: relative;
  aspect-ratio: 5/3; display: flex; align-items: center; justify-content: center;
  background: #16213e;
}
.flag-opt img { width: 100%; height: 100%; object-fit: contain; }
.flag-opt.selected { border-color: #e94560; box-shadow: 0 0 8px rgba(233,69,96,0.5); }
.flag-opt.correct { border-color: #4ecca3; box-shadow: 0 0 8px rgba(78,204,163,0.5); }
.flag-opt.wrong { border-color: #ff6b6b; opacity: 0.5; }
.flag-opt.disabled { pointer-events: none; }

.flag-opt .flag-label {
  display: none; position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.7); color: #eee; font-size: 0.7em;
  padding: 2px 4px; text-align: center;
}
.flag-opt.show-label .flag-label { display: block; }

.btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
.btn {
  flex: 1; padding: 12px; font-size: 1em; border: none; border-radius: 8px;
  cursor: pointer; font-weight: bold; transition: all 0.2s;
}
.btn:disabled { opacity: 0.4; cursor: default; }
.btn-submit { background: #4ecca3; color: #1a1a2e; }
.btn-reveal { background: #e94560; color: #fff; }
.btn-next { background: #0f3460; color: #fff; }
.btn-end { background: #333; color: #aaa; }
.btn-next:hover { background: #1a5276; }

.feedback {
  padding: 10px; border-radius: 8px; margin-bottom: 8px;
  font-size: 0.95em; display: none;
}
.feedback.show { display: block; }
.feedback.good { background: #1b4332; color: #4ecca3; }
.feedback.bad { background: #3d0000; color: #ff6b6b; }
.feedback.neutral { background: #16213e; color: #aaa; }

/* Summary screen */
#summary { max-width: 600px; margin: 0 auto; display: none; }
.summary-score {
  text-align: center; padding: 20px; background: #16213e;
  border-radius: 10px; margin-bottom: 16px;
}
.summary-score .big { font-size: 2.5em; color: #e94560; font-weight: bold; }
.summary-score .sub { color: #aaa; margin-top: 4px; }
.summary-table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
.summary-table th {
  background: #16213e; padding: 8px 6px; text-align: left;
  position: sticky; top: 0; border-bottom: 2px solid #e94560;
}
.summary-table td { padding: 6px; border-bottom: 1px solid #333; vertical-align: middle; }
.summary-table tr.wrong-row { background: rgba(233,69,96,0.1); }
.summary-table .mini-flag { width: 32px; height: 20px; object-fit: contain; vertical-align: middle; }
.summary-table .ok { color: #4ecca3; }
.summary-table .nok { color: #ff6b6b; }
.btn-restart {
  display: block; width: 100%; padding: 14px; margin-top: 16px;
  font-size: 1.1em; border: 2px solid #e94560; border-radius: 10px;
  background: transparent; color: #eee; cursor: pointer;
}
.btn-restart:hover { background: #e94560; color: #fff; }

.progress-text { text-align: center; color: #555; font-size: 0.8em; margin-bottom: 8px; }
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="start">
  <h1>Stolice i Flagi</h1>
  <h2>Wybierz kategorię</h2>
  <div id="categories"></div>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz">
  <div class="score-bar">
    <span>Pytanie <span id="qNum">1</span>/<span id="qTotal">0</span></span>
    <span>Punkty: <span class="pts" id="score">0</span>/<span id="scoreMax">0</span></span>
  </div>
  <div class="country-name" id="countryName"></div>
  <div class="input-row">
    <label>Wpisz stolicę:</label>
    <input type="text" id="capitalInput" autocomplete="off" autocapitalize="sentences" placeholder="Stolica...">
  </div>
  <div class="flags-label">Wybierz flagę:</div>
  <div class="flags-grid" id="flagsGrid"></div>
  <div id="feedback" class="feedback"></div>
  <div class="btn-row" id="actionRow">
    <button class="btn btn-submit" id="btnSubmit" onclick="submitAnswer()">Sprawdź</button>
    <button class="btn btn-reveal" id="btnReveal" onclick="revealAnswer()">Pokaż odpowiedź</button>
  </div>
  <div class="btn-row" id="nextRow" style="display:none">
    <button class="btn btn-next" onclick="nextQuestion()">Następne pytanie</button>
  </div>
  <div style="margin-top:8px">
    <button class="btn btn-end" style="width:100%" onclick="endQuiz()">Zakończ quiz</button>
  </div>
</div>

<!-- SUMMARY SCREEN -->
<div id="summary">
  <h1>Podsumowanie</h1>
  <div class="summary-score">
    <div class="big" id="finalScore">0</div>
    <div class="sub" id="finalScoreSub"></div>
  </div>
  <div style="overflow-x:auto">
    <table class="summary-table" id="summaryTable">
      <thead>
        <tr>
          <th>Kraj</th>
          <th>Stolica</th>
          <th>Twoja odp.</th>
          <th>Flaga</th>
          <th>Pkt</th>
        </tr>
      </thead>
      <tbody id="summaryBody"></tbody>
    </table>
  </div>
  <button class="btn-restart" onclick="backToStart()">Nowy quiz</button>
</div>

<script>

// Filter out entries with no capital
const ALL = COUNTRIES.filter(c => c.c !== '-');

// State
let pool = [];
let allFlags = [];
let current = null;
let selectedFlag = null;
let answered = false;
let score = 0;
let maxScore = 0;
let questionNum = 0;
let results = [];

function getByCategory(category) {
  if (category === 'Wszystkie') return ALL.slice();
  if (category === 'Terytoria') return ALL.filter(c => c.t === 'Terytorium');
  if (category === 'Części kraju') return ALL.filter(c => c.t === 'Część kraju');
  if (category === 'Państwa') return ALL.filter(c => c.t === 'Państwo');
  return ALL.filter(c => c.k === category);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function normalize(s) {
  return s.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[''`]/g, "'")
    .replace(/\s+/g, ' ');
}

// Build start screen
function buildStart() {
  const cats = document.getElementById('categories');
  cats.innerHTML = '';
  const categories = [
    'Wszystkie',
    'Europa', 'Azja', 'Afryka', 'Ameryka Północna', 'Ameryka Południowa', 'Oceania', 'Antarktyda',
    'Państwa', 'Terytoria', 'Części kraju'
  ];
  categories.forEach(cat => {
    const items = getByCategory(cat);
    if (items.length === 0) return;
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.innerHTML = `${cat} <span class="count">(${items.length})</span>`;
    btn.onclick = () => startQuiz(cat);
    cats.appendChild(btn);
  });
}

function startQuiz(continent) {
  pool = shuffle(getByCategory(continent));
  allFlags = ALL.map(c => ({ n: c.n, f: c.f }));
  score = 0;
  maxScore = 0;
  questionNum = 0;
  results = [];
  document.getElementById('qTotal').textContent = pool.length;
  document.getElementById('start').style.display = 'none';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  nextQuestion();
}

function nextQuestion() {
  if (pool.length === 0) { showSummary(); return; }

  current = pool.pop();
  questionNum++;
  answered = false;
  selectedFlag = null;

  document.getElementById('qNum').textContent = questionNum;
  document.getElementById('score').textContent = score;
  document.getElementById('scoreMax').textContent = maxScore;
  document.getElementById('countryName').textContent = current.n;
  document.getElementById('capitalInput').value = '';
  document.getElementById('capitalInput').disabled = false;
  document.getElementById('capitalInput').focus();

  // Pick 4 wrong flags + 1 correct
  const wrongFlags = shuffle(allFlags.filter(f => f.n !== current.n)).slice(0, 4);
  const options = shuffle([
    { n: current.n, f: current.f, correct: true },
    ...wrongFlags.map(f => ({ n: f.n, f: f.f, correct: false }))
  ]);

  // For 5 flags, use 3+2 grid layout: first row 3, second row 2 centered
  const grid = document.getElementById('flagsGrid');
  grid.innerHTML = '';
  // Use flex layout for better 5-item display
  grid.style.display = 'flex';
  grid.style.flexWrap = 'wrap';
  grid.style.justifyContent = 'center';
  grid.style.gap = '8px';

  options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'flag-opt';
    div.style.width = 'calc(33% - 6px)';
    div.style.aspectRatio = '5/3';
    div.dataset.idx = i;
    div.dataset.correct = opt.correct;
    div.dataset.name = opt.n;
    div.innerHTML = `<img src="data:image/png;base64,${opt.f}" alt="flaga"><div class="flag-label">${opt.n}</div>`;
    div.onclick = () => selectFlag(div, i);
    grid.appendChild(div);
  });

  // Show action buttons, hide next
  document.getElementById('actionRow').style.display = 'flex';
  document.getElementById('nextRow').style.display = 'none';
  document.getElementById('btnSubmit').disabled = false;
  document.getElementById('btnReveal').disabled = false;
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';
}

function selectFlag(div, idx) {
  if (answered) return;
  document.querySelectorAll('.flag-opt').forEach(el => el.classList.remove('selected'));
  div.classList.add('selected');
  selectedFlag = idx;
}

function submitAnswer() {
  if (answered) return;
  answered = true;
  maxScore += 2;

  const userCapital = document.getElementById('capitalInput').value;
  const correctCapital = current.c;
  const capitalOk = normalize(userCapital) === normalize(correctCapital);

  let flagOk = false;
  document.querySelectorAll('.flag-opt').forEach(el => {
    el.classList.add('disabled');
    if (el.dataset.correct === 'true') {
      el.classList.add('correct');
      el.classList.add('show-label');
      if (el.classList.contains('selected')) flagOk = true;
    } else if (el.classList.contains('selected')) {
      el.classList.add('wrong');
      el.classList.add('show-label');
    }
  });

  let pts = 0;
  if (capitalOk) pts++;
  if (flagOk) pts++;
  score += pts;

  document.getElementById('capitalInput').disabled = true;
  document.getElementById('score').textContent = score;
  document.getElementById('scoreMax').textContent = maxScore;

  const fb = document.getElementById('feedback');
  if (pts === 2) {
    fb.className = 'feedback show good';
    fb.textContent = 'Brawo! Obie odpowiedzi poprawne! +2 pkt';
  } else if (pts === 1) {
    const what = capitalOk ? 'Stolica poprawna' : 'Flaga poprawna';
    const fix = capitalOk ? '' : ` Poprawna stolica: ${correctCapital}`;
    fb.className = 'feedback show neutral';
    fb.textContent = `${what}, ale ${capitalOk ? 'flaga' : 'stolica'} niepoprawna. +1 pkt.${fix}`;
  } else {
    fb.className = 'feedback show bad';
    fb.textContent = `Niestety, obie odpowiedzi błędne. Poprawna stolica: ${correctCapital}. 0 pkt`;
  }

  results.push({
    country: current.n,
    correctCapital: correctCapital,
    userCapital: userCapital,
    capitalOk: capitalOk,
    flagOk: flagOk,
    revealed: false,
    pts: pts,
    flagBase64: current.f
  });

  document.getElementById('actionRow').style.display = 'none';
  document.getElementById('nextRow').style.display = 'flex';
}

function revealAnswer() {
  if (answered) return;
  answered = true;
  maxScore += 2;

  const correctCapital = current.c;
  document.getElementById('capitalInput').value = correctCapital;
  document.getElementById('capitalInput').disabled = true;

  document.querySelectorAll('.flag-opt').forEach(el => {
    el.classList.add('disabled');
    if (el.dataset.correct === 'true') {
      el.classList.add('correct');
      el.classList.add('show-label');
    }
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback show neutral';
  fb.textContent = `Odpowiedź: ${correctCapital}. 0 punktów za to pytanie.`;

  document.getElementById('score').textContent = score;
  document.getElementById('scoreMax').textContent = maxScore;

  results.push({
    country: current.n,
    correctCapital: correctCapital,
    userCapital: '(pokazano)',
    capitalOk: false,
    flagOk: false,
    revealed: true,
    pts: 0,
    flagBase64: current.f
  });

  document.getElementById('actionRow').style.display = 'none';
  document.getElementById('nextRow').style.display = 'flex';
}

function endQuiz() {
  // If current question not answered, don't count it
  showSummary();
}

function showSummary() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('summary').style.display = 'block';

  document.getElementById('finalScore').textContent = `${score} / ${maxScore}`;
  const pct = maxScore > 0 ? Math.round(score / maxScore * 100) : 0;
  document.getElementById('finalScoreSub').textContent = `${pct}% poprawnych odpowiedzi (${results.length} pytań)`;

  const tbody = document.getElementById('summaryBody');
  tbody.innerHTML = '';
  results.forEach(r => {
    const tr = document.createElement('tr');
    if (!r.capitalOk || !r.flagOk) tr.className = 'wrong-row';

    const capitalClass = r.revealed ? 'nok' : (r.capitalOk ? 'ok' : 'nok');
    const flagClass = r.revealed ? 'nok' : (r.flagOk ? 'ok' : 'nok');
    const userCapDisplay = r.revealed
      ? '<em style="color:#888">pokazano</em>'
      : (r.capitalOk
        ? `<span class="ok">${esc(r.userCapital)}</span>`
        : `<span class="nok">${esc(r.userCapital) || '—'}</span>`);

    tr.innerHTML = `
      <td>${esc(r.country)}</td>
      <td><span class="${capitalClass}">${esc(r.correctCapital)}</span></td>
      <td>${userCapDisplay}</td>
      <td><img class="mini-flag" src="data:image/png;base64,${r.flagBase64}"> <span class="${flagClass}">${r.flagOk ? '✓' : '✗'}</span></td>
      <td><strong>${r.pts}</strong>/2</td>
    `;
    tbody.appendChild(tr);
  });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function backToStart() {
  document.getElementById('summary').style.display = 'none';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('start').style.display = 'block';
}

// Handle Enter key in input
document.getElementById('capitalInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !answered) submitAnswer();
});

// Init
buildStart();
</script>
